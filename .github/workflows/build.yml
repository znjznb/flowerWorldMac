name: Build macOS App

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'FlowerWorldWidget/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcodegen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        working-directory: FlowerWorldWidget
        run: xcodegen generate

      - name: Patch project format for Xcode 15 compatibility
        working-directory: FlowerWorldWidget
        run: |
          PBXPROJ="花花世界.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ" ]; then
            # Change objectVersion from 77 (Xcode 16) to 60 (Xcode 15)
            sed -i '' 's/objectVersion = 77;/objectVersion = 60;/' "$PBXPROJ"
            echo "✅ Patched project format to objectVersion 60"
          else
            echo "⚠️  project.pbxproj not found, skipping patch"
          fi

      - name: Build .app
        working-directory: FlowerWorldWidget
        run: |
          xcodebuild -project "花花世界.xcodeproj" \
                     -scheme FlowerWorldWidget \
                     -configuration Release \
                     -derivedDataPath build/DerivedData \
                     build

      - name: Package .app as ZIP
        working-directory: FlowerWorldWidget
        run: |
          APP_PATH=$(find build/DerivedData -name "*.app" -type d -path "*/Release/*" 2>/dev/null | head -1)
          if [ -d "$APP_PATH" ]; then
            echo "📦 找到 .app: $APP_PATH"
            ditto -c -k --keepParent "$APP_PATH" "花花世界.zip"
            echo "✅ 打包成功"
          else
            echo "❌ 未找到 .app (搜索路径: build/DerivedData)"
            find build/DerivedData -type d -name "*.app" 2>/dev/null || echo "(无 .app 文件)"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 花花世界
          path: FlowerWorldWidget/花花世界.zip
          if-no-files-found: error
